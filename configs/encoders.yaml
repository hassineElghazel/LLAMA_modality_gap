# Plain CLIP ViT-L/14 vision encoder (frozen across all conditions).
#
# Spec: image -> 224x224 -> CLIP ViT-L/14 -> 257 tokens (1 CLS + 256 patches)
# of 1024-dim each. Used as the visual feature source for the connector.

vision_model:
  hf_id: openai/clip-vit-large-patch14
  image_size: 224
  # 14x14 patch over 224x224 -> 16x16 patches + 1 CLS = 257 tokens.
  num_visual_tokens: 257
  # Per-token vision hidden dim for ViT-L/14 (canonical CLIP value).
  vision_hidden_dim: 1024

image_processor:
  # CLIPImageProcessor ships with openai/clip-vit-large-patch14. Mean/std
  # listed for documentation only; the processor uses its own values.
  hf_id: openai/clip-vit-large-patch14
  mean: [0.48145466, 0.4578275, 0.40821073]
  std: [0.26862954, 0.26130258, 0.27577711]

inference:
  device: cuda
  # Storage dtype for token-level features (input to the connector). Gap
  # diagnostics ALWAYS cast to Float64 (see metrics.py).
  embedding_dtype: float32
  batch_size: 32
