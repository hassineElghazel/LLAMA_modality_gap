# Dataset paths and diagnostic-sample manifest.

# COCO val2017 (5,000 images x 5 captions) — sole evaluation source for the
# gap measurements AND for the captioning quality benchmarks (CIDEr / BLEU-4 /
# METEOR). No overlap with Stage 1 or Stage 2 training data.
coco_val2017:
  image_root: data/coco/val2017
  annotations_json: data/coco/annotations/captions_val2017.json
  expected_num_images: 5000

diagnostic_sample:
  # Spec §6.2: same eval set for every measurement point. Sample one caption
  # per image with a fixed seed for paired (image, caption) reproducibility.
  num_pairs: 5000
  caption_per_image: 1
  seed: 42
  manifest_path: outputs/diagnostics_manifest.json

# Stage 1 contrastive pretraining data.
bunny_v1_1:
  hf_repo: BoyaWu10/Bunny-v1_1-data
  local_path: data/bunny_v1_1/pretrain
  image_root: data/bunny_v1_1/pretrain/images

# Stage 2 autoregressive captioning data.
llava_instruct_150k:
  hf_repo: liuhaotian/LLaVA-Instruct-150K
  local_path: data/llava_instruct_150k
  # Image source for LLaVA-Instruct: COCO train2017.
  image_root: data/coco/train2017
