# Stage 1: contrastive connector pre-training (InfoNCE in LLaMA's 4096-d space).
#
# Trains the connector with symmetric InfoNCE so the image-side mean-pooled
# connector output aligns with the text-side mean-pooled LLaMA embedding for
# the same caption. ViT frozen, LLaMA-embed frozen (text-side target only),
# rest of LLaMA not involved.

data:
  dataset: bunny_v1_1
  path: data/bunny_v1_1
  hf_repo: BoyaWu10/Bunny-v1.1-data

freeze:
  llm_embed: true   # text-side target only
  vit: true
  connector: false

loss:
  type: infonce_symmetric
  temperature_init: 0.07
  temperature_learnable: true

pooling:
  # Spec §3.2: image side mean-pools the connector output; text side mean-pools
  # LLaMA's embedding-table lookups.
  image: mean
  text: mean

optimizer:
  name: adamw
  lr: 5.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.999]
  eps: 1.0e-8

schedule:
  warmup_ratio: 0.03
  type: cosine
  num_epochs: 1

batch:
  # InfoNCE benefits from larger batches. Stage 1 loads LLaMA-2 onto CPU RAM
  # (not GPU VRAM), so 11 GB GPU is sufficient. Reduce if CPU RAM is <32 GB.
  per_device_batch_size: 64
  gradient_accumulation_steps: 1

precision:
  amp: bf16

logging:
  log_every_steps: 50
  save_every_steps: 5000

output:
  checkpoint_path: outputs/checkpoints/stage1_connector.pt
  log_dir: outputs/logs/stage1

seed: 42
