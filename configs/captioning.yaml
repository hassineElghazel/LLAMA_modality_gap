# Zero-shot / fine-tuned captioning evaluation on COCO val2017 (5K images).

eval_set:
  name: coco_val2017
  num_images: 5000
  annotations_json: data/coco/annotations/captions_val2017.json
  image_root: data/coco/val2017

prompt:
  system: ""
  user: |
    <image>
    Provide a brief, one-sentence description of this image.

generation:
  do_sample: false
  num_beams: 1
  max_new_tokens: 64

batch:
  per_device_batch_size: 8

# Per-condition checkpoint resolution is handled by scripts/run_condition.py;
# this default targets the C3 full-pipeline output.
checkpoint:
  vlm_checkpoint: outputs/checkpoints/stage2_vlm.pt

output:
  predictions_dir: outputs/predictions
  scores_dir: outputs/metrics
  qualitative_report_dir: outputs/reports
  num_qualitative_samples: 20

seed: 42
