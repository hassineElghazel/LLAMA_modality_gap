# LLaMA-2-7B configuration (Stage 2: LoRA fine-tuning).

model:
  name: llama2_7b
  hf_id: NousResearch/Llama-2-7b-hf
  hidden_size: 4096
  # Image placeholder token spliced into the prompt; connector output replaces it.
  image_token: "<image>"

dtype:
  weights: bfloat16
  compute: bfloat16

# 4-bit NF4 QLoRA: required for GPUs with <14 GB VRAM (e.g. RTX 2080 Ti 11 GB).
# Set load_in_4bit: false on A100 / H100 where bfloat16 fits natively.
quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true

generation:
  do_sample: false
  num_beams: 1
  max_new_tokens: 64
  temperature: 1.0
  top_p: 1.0

tokenizer:
  pad_token: "</s>"
  padding_side: left
