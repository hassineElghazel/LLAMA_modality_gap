# LLaMA-2-7B configuration (Stage 2: LoRA fine-tuning).

model:
  name: llama2_7b
  hf_id: meta-llama/Llama-2-7b-hf
  hidden_size: 4096
  # Image placeholder token spliced into the prompt; connector output replaces it.
  image_token: "<image>"

dtype:
  weights: bfloat16
  compute: bfloat16

generation:
  do_sample: false
  num_beams: 1
  max_new_tokens: 64
  temperature: 1.0
  top_p: 1.0

tokenizer:
  pad_token: "</s>"
  padding_side: left
