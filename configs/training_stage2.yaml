# Stage 2: autoregressive image captioning on LLaVA-Instruct-150K.
#
# Refines the connector and trains LLaMA-2-7B via LoRA. ViT stays frozen.
# AR cross-entropy on text positions only.

data:
  dataset: llava_instruct_150k
  path: data/llava_instruct_150k
  hf_repo: liuhaotian/LLaVA-Instruct-150K

freeze:
  vit: true
  connector: false   # refined
  llm: true          # base LLM frozen; only LoRA adapters train

# Initialize connector. For C1 (Stage-2-only), set to "random".
# For C3 (full pipeline), point at the Stage-1 checkpoint.
init_from:
  connector_checkpoint: outputs/checkpoints/stage1_connector.pt

lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules: [q_proj, v_proj, o_proj]
  bias: none

optimizer:
  name: adamw
  lr: 2.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.999]
  eps: 1.0e-8

schedule:
  warmup_ratio: 0.03
  type: cosine
  num_epochs: 1

batch:
  # RTX 2080 Ti (11 GB): B=4 + accum=8 → eff. batch 32. Smaller LoRA (r=8,
  # q/v/o only, 27M params) reduces optimizer state enough to fit B=4 with
  # 4-bit base + GC. Fewer Python-level accumulation iterations → better GPU
  # utilisation vs B=1+accum=32.
  # Set per_device_batch_size: 16 and gradient_accumulation_steps: 2 on A100.
  per_device_batch_size: 4
  gradient_accumulation_steps: 8

precision:
  amp: bf16

# Optional: DeepSpeed config for multi-GPU. ZeRO-2 is sufficient for LoRA.
deepspeed:
  enabled: false
  config: configs/deepspeed/zero2.json

logging:
  log_every_steps: 1
  # Save frequently so a crash costs at most save_every_steps × ~2 min, not the
  # whole run. Checkpoint includes optimizer/scheduler/step/RNG, so resume is
  # exact via `06_train_stage2.py --resume <ckpt>`.
  save_every_steps: 50
  notify_every_steps: 50

output:
  checkpoint_path: outputs/checkpoints/stage2_vlm.pt
  log_dir: outputs/logs/stage2

seed: 42
