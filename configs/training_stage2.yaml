# Stage 2: full visual instruction tuning on InternVL-Chat-V1.2-SFT.
# Full LLM fine-tuning. A100 required (40GB minimum, 80GB more comfortable).

data:
  dataset: internvl_chat_v1_2_sft
  path: data/internvl_sft

freeze:
  llm: false
  encoder: true   # encoder stays frozen per papers
  projector: false

# Initialize projector from Stage 1 checkpoint.
init_from:
  projector_checkpoint: outputs/checkpoints/stage1_projector.pt

optimizer:
  name: adamw
  lr: 1.0e-5
  weight_decay: 0.0
  betas: [0.9, 0.999]
  eps: 1.0e-8

schedule:
  warmup_ratio: 0.03
  type: cosine
  num_epochs: 1

batch:
  per_device_batch_size: 16
  gradient_accumulation_steps: 1

precision:
  amp: bf16

deepspeed:
  # Vendored from Yu-xm/ReVision @ 9353aea — see THIRD_PARTY_LICENSES.md.
  # Reference uses zero2 for full FT; switch to zero3 if A100-80GB OOMs.
  config: configs/deepspeed/zero2.json

# Fallback if A100 unavailable: LoRA on attention + MLP projections.
# Document explicitly as a hardware-constrained choice.
lora_fallback:
  enabled: false
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

logging:
  log_every_steps: 50
  save_every_steps: 5000

output:
  checkpoint_path: outputs/checkpoints/stage2_full.pt
  log_dir: outputs/logs/stage2

seed: 42
