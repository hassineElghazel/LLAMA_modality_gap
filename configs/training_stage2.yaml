# Stage 2: autoregressive image captioning on LLaVA-Instruct-150K.
#
# Refines the connector and trains LLaMA-2-7B via LoRA. ViT stays frozen.
# AR cross-entropy on text positions only.

data:
  dataset: llava_instruct_150k
  path: data/llava_instruct_150k
  hf_repo: liuhaotian/LLaVA-Instruct-150K

freeze:
  vit: true
  connector: false   # refined
  llm: true          # base LLM frozen; only LoRA adapters train

# Initialize connector. For C1 (Stage-2-only), set to "random".
# For C3 (full pipeline), point at the Stage-1 checkpoint.
init_from:
  connector_checkpoint: outputs/checkpoints/stage1_connector.pt

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  bias: none

optimizer:
  name: adamw
  lr: 2.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.999]
  eps: 1.0e-8

schedule:
  warmup_ratio: 0.03
  type: cosine
  num_epochs: 1

batch:
  # RTX 2080 Ti (11 GB) with 4-bit QLoRA + liger-kernel fused linear+CE +
  # gradient checkpointing: batch_size=2 + accum=16 → eff. batch 32.
  # MLP down_proj on bnb-4bit at B=4 OOMs even with liger; B=2 fits comfortably.
  # Set per_device_batch_size: 16 and gradient_accumulation_steps: 2 on A100.
  per_device_batch_size: 2
  gradient_accumulation_steps: 16

precision:
  amp: bf16

# Optional: DeepSpeed config for multi-GPU. ZeRO-2 is sufficient for LoRA.
deepspeed:
  enabled: false
  config: configs/deepspeed/zero2.json

logging:
  log_every_steps: 50
  # Stage 2 has ~4.7k optimizer steps total (LLaVA-Instruct-150K at eff_batch=32).
  # Save every 500 steps so a crash at step 4000 doesn't lose all progress.
  save_every_steps: 500
  # Telegram cadence: ~24 updates over a 4.7k-step run.
  notify_every_steps: 200

output:
  checkpoint_path: outputs/checkpoints/stage2_vlm.pt
  log_dir: outputs/logs/stage2

seed: 42
