# 2-layer MLP connector (LLaVA-style) — the only component that varies across
# the C0/C1/C2/C3 experimental conditions.
#
# Maps CLIP ViT-L/14 token features (1024-d) into LLaMA-2-7B input embedding
# space (4096-d).

architecture:
  type: mlp2x_gelu
  in_dim: 1024     # CLIP ViT-L/14 per-token hidden dim
  hidden_dim: 4096
  out_dim: 4096    # LLaMA-2-7B hidden size
  activation: gelu

initialization:
  weight_init: kaiming_normal
  bias_init: zeros

# Stage 2 keeps the full 257-token visual sequence; Stage 1 mean-pools the
# connector output for the InfoNCE contrastive target. See
# configs/training_stage1.yaml and src/diagnostics/extract_projected.py.
sequence:
  num_visual_tokens: 257
